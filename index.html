<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brawl Shop</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Poppins:wght@400;600;700&family=Russo+One&family=Inter:wght@300;400;600&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0a0d18;
            font-family: 'Inter', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-image: 
                radial-gradient(2px 2px at 20px 30px, #eee, transparent),
                radial-gradient(2px 2px at 40px 70px, #fff, transparent),
                radial-gradient(2px 2px at 50px 160px, #ddd, transparent),
                radial-gradient(2px 2px at 90px 40px, #fff, transparent),
                radial-gradient(2px 2px at 130px 80px, #eee, transparent),
                radial-gradient(2px 2px at 160px 30px, #ddd, transparent);
            background-size: 200px 200px;
            opacity: 0.3;
            pointer-events: none;
            z-index: 0;
        }

        .container {
            max-width: 440px;
            width: 100%;
            background: linear-gradient(160deg, #111a2e, #0d1425);
            border-radius: 40px;
            padding: 30px 24px 34px;
            border: 1px solid rgba(255, 215, 0, 0.12);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.9), 0 0 60px rgba(255, 215, 0, 0.03);
            position: relative;
            z-index: 1;
            animation: floatIn 1s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes floatIn {
            0% { opacity: 0; transform: translateY(60px) scale(0.94); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
        }

        .header h1 {
            font-family: 'Russo One', sans-serif;
            font-size: 26px;
            letter-spacing: 2px;
            background: linear-gradient(135deg, #f9d976, #f39c12);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 40px rgba(255, 215, 0, 0.15);
            text-transform: uppercase;
        }

        .badge {
            font-family: 'Orbitron', sans-serif;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.8px;
            text-transform: uppercase;
            color: #f7c948;
            background: rgba(255, 215, 0, 0.08);
            padding: 6px 16px;
            border-radius: 60px;
            border: 1px solid rgba(255, 215, 0, 0.15);
            animation: glowBadge 2.5s ease-in-out infinite;
        }

        @keyframes glowBadge {
            0%, 100% { box-shadow: 0 0 5px rgba(255, 215, 0, 0.05); }
            50% { box-shadow: 0 0 25px rgba(255, 215, 0, 0.08); }
        }

        .user-card {
            display: flex;
            align-items: center;
            gap: 14px;
            background: rgba(255, 255, 255, 0.03);
            padding: 10px 16px 10px 12px;
            border-radius: 60px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            backdrop-filter: blur(4px);
            transition: 0.3s;
        }

        .user-card:hover {
            background: rgba(255, 255, 255, 0.06);
            border-color: rgba(255, 215, 0, 0.1);
        }

        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #f7c948, #f39c12);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Poppins', sans-serif;
            font-weight: 700;
            font-size: 18px;
            color: #0a0d18;
            flex-shrink: 0;
            box-shadow: 0 0 20px rgba(255, 215, 0, 0.15);
        }

        .avatar img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: cover;
        }

        .user-name {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 15px;
            color: #f0f2f8;
        }

        .user-name span {
            font-weight: 400;
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            display: block;
            margin-top: 1px;
        }

        .product {
            background: rgba(255, 255, 255, 0.02);
            border-radius: 20px;
            padding: 16px 18px;
            margin-bottom: 14px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            animation: slideUp 0.6s ease both;
            cursor: default;
        }

        .product:nth-child(1) { animation-delay: 0.05s; }
        .product:nth-child(2) { animation-delay: 0.15s; }
        .product:nth-child(3) { animation-delay: 0.25s; }

        @keyframes slideUp {
            0% { opacity: 0; transform: translateY(30px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .product:hover {
            background: rgba(255, 215, 0, 0.03);
            border-color: rgba(255, 215, 0, 0.12);
            transform: translateY(-2px) scale(1.005);
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .product-info {
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .product-name {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 15px;
            letter-spacing: 0.5px;
            color: #f5f7ff;
        }

        .product-price {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 18px;
            color: #f7c948;
            transition: 0.4s ease;
        }

        .product-price.discounted {
            color: #4ade80;
            text-shadow: 0 0 30px rgba(74, 222, 128, 0.15);
        }

        .product-price .old-price {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.2);
            text-decoration: line-through;
            margin-right: 8px;
            font-weight: 400;
        }

        .btn-cart {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 8px 18px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #f7c948, #f39c12);
            color: #0a0d18;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            box-shadow: 0 4px 15px rgba(255, 215, 0, 0.15);
            white-space: nowrap;
        }

        .btn-cart:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(255, 215, 0, 0.25);
        }

        .btn-cart:active {
            transform: scale(0.94);
        }

        .btn-cart.added {
            background: rgba(74, 222, 128, 0.15);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.2);
            box-shadow: none;
        }

        .promo-section {
            margin: 22px 0 20px;
            display: flex;
            gap: 10px;
            align-items: center;
            flex-wrap: wrap;
        }

        .promo-input {
            flex: 1;
            min-width: 140px;
            padding: 12px 18px;
            border-radius: 60px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.03);
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            font-size: 14px;
            color: #fff;
            outline: none;
            transition: 0.3s;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        .promo-input:focus {
            border-color: rgba(255, 215, 0, 0.2);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 30px rgba(255, 215, 0, 0.03);
        }

        .promo-input::placeholder {
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.5px;
            font-size: 12px;
            text-transform: none;
        }

        .btn-promo {
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
            padding: 12px 24px;
            border-radius: 60px;
            border: none;
            background: rgba(255, 255, 255, 0.04);
            color: #aaa;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .btn-promo.active {
            background: linear-gradient(135deg, #f7c948, #f39c12);
            color: #0a0d18;
            box-shadow: 0 4px 25px rgba(255, 215, 0, 0.15);
        }

        .btn-promo.active:hover {
            transform: scale(1.04);
            box-shadow: 0 8px 40px rgba(255, 215, 0, 0.2);
        }

        .total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 14px 0 6px;
            border-top: 1px solid rgba(255, 255, 255, 0.03);
            margin-top: 8px;
        }

        .total-label {
            font-family: 'Poppins', sans-serif;
            font-weight: 400;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
        }

        .total-price {
            font-family: 'Orbitron', sans-serif;
            font-weight: 700;
            font-size: 22px;
            color: #f7c948;
            transition: 0.4s ease;
        }

        .total-price.discounted {
            color: #4ade80;
            text-shadow: 0 0 40px rgba(74, 222, 128, 0.1);
        }

        .btn-checkout {
            width: 100%;
            padding: 16px;
            border-radius: 60px;
            border: none;
            font-family: 'Russo One', sans-serif;
            font-size: 18px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #f7c948, #f39c12);
            color: #0a0d18;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            margin-top: 12px;
            box-shadow: 0 6px 35px rgba(255, 215, 0, 0.1);
        }

        .btn-checkout:hover {
            transform: scale(1.02);
            box-shadow: 0 10px 50px rgba(255, 215, 0, 0.2);
        }

        .btn-checkout:active {
            transform: scale(0.96);
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.7);
            backdrop-filter: blur(12px);
            display: none;
            align-items: center;
            justify-content: center;
            z-index: 999;
            animation: fadeModal 0.5s ease;
        }

        .modal-overlay.show {
            display: flex;
        }

        @keyframes fadeModal {
            0% { opacity: 0; }
            100% { opacity: 1; }
        }

        .modal {
            background: linear-gradient(160deg, #1a2340, #0d1425);
            border-radius: 40px;
            padding: 40px 32px 32px;
            max-width: 360px;
            width: 90%;
            text-align: center;
            border: 1px solid rgba(255, 215, 0, 0.08);
            box-shadow: 0 40px 100px rgba(0, 0, 0, 0.8);
            animation: popModal 0.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes popModal {
            0% { opacity: 0; transform: scale(0.8) translateY(30px); }
            100% { opacity: 1; transform: scale(1) translateY(0); }
        }

        .modal .emoji-big {
            font-size: 56px;
            margin-bottom: 12px;
            display: block;
        }

        .modal h2 {
            font-family: 'Russo One', sans-serif;
            font-size: 24px;
            letter-spacing: 1px;
            color: #f7c948;
            margin-bottom: 6px;
        }

        .modal p {
            font-family: 'Poppins', sans-serif;
            font-size: 14px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.6;
        }

        .modal .btn-close {
            margin-top: 20px;
            padding: 12px 40px;
            border-radius: 60px;
            border: none;
            font-family: 'Poppins', sans-serif;
            font-weight: 600;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.04);
            color: #aaa;
            cursor: pointer;
            transition: 0.3s;
            border: 1px solid rgba(255, 255, 255, 0.04);
        }

        .modal .btn-close:hover {
            background: rgba(255, 255, 255, 0.08);
            color: #fff;
        }

        @media (max-width: 460px) {
            .container { padding: 20px 16px 26px; }
            .header h1 { font-size: 20px; }
            .product { padding: 14px 14px; flex-wrap: wrap; gap: 8px; }
            .product-name { font-size: 13px; }
            .product-price { font-size: 16px; }
            .btn-cart { font-size: 10px; padding: 6px 14px; }
            .total-price { font-size: 18px; }
            .btn-checkout { font-size: 15px; padding: 14px; }
        }
    </style>
</head>
<body>

<div class="container" id="app">
    <div class="header">
        <h1>⚡ BRAWL SHOP</h1>
        <span class="badge">✦ НОВИНКА</span>
    </div>

    <div class="user-card" id="userCard">
        <div class="avatar" id="avatar">👤</div>
        <div class="user-name" id="userName">
            Игрок <span>не авторизован</span>
        </div>
    </div>

    <div id="products">
        <div class="product" data-product="cybershell">
            <div class="product-info">
                <div class="product-name">КИБЕРШЕЛЛИ</div>
                <div class="product-price" id="price-cybershell">1 500 ₽</div>
            </div>
            <button class="btn-cart" data-product="cybershell">В КОРЗИНУ</button>
        </div>

        <div class="product" data-product="volt">
            <div class="product-info">
                <div class="product-name">ВОЛЬТ</div>
                <div class="product-price" id="price-volt">1 100 ₽</div>
            </div>
            <button class="btn-cart" data-product="volt">В КОРЗИНУ</button>
        </div>

        <div class="product" data-product="push20k">
            <div class="product-info">
                <div class="product-name">PUSH 20K</div>
                <div class="product-price" id="price-push20k">1 000 ₽</div>
            </div>
            <button class="btn-cart" data-product="push20k">В КОРЗИНУ</button>
        </div>
    </div>

    <div class="promo-section">
        <input class="promo-input" id="promoInput" type="text" placeholder="Введите промокод" />
        <button class="btn-promo" id="promoBtn">АКТИВИРОВАТЬ</button>
    </div>

    <div class="total">
        <span class="total-label">ИТОГО</span>
        <span class="total-price" id="totalPrice">0 ₽</span>
    </div>

    <button class="btn-checkout" id="checkoutBtn">ОФОРМИТЬ ЗАКАЗ</button>
</div>

<div class="modal-overlay" id="modal">
    <div class="modal">
        <span class="emoji-big">🎉</span>
        <h2>ЗАКАЗ ОФОРМЛЕН!</h2>
        <p>Скоро с вами свяжется администратор для подтверждения.</p>
        <button class="btn-close" id="modalClose">ОТЛИЧНО!</button>
    </div>
</div>

<script>
    // ============ КОНСТАНТЫ ИЗ SECRETS (подставляются при сборке) ============
    const PROMOCODE = '{{PROMOCODE}}';
    const BOT_TOKEN = '{{BOT_TOKEN}}';
    const ADMIN_ID = '{{ADMIN_ID}}';

    // ============ ТОВАРЫ ============
    const PRODUCTS = {
        cybershell: { name: 'КИБЕРШЕЛЛИ', price: 1500, priceDisc: 0 },
        volt: { name: 'ВОЛЬТ', price: 1100, priceDisc: 0 },
        push20k: { name: 'PUSH 20K', price: 1000, priceDisc: 0 }
    };

    let promoActive = false;
    let cart = {};

    // ============ TELEGRAM WEBAPP ============
    let user = null;
    try {
        if (window.Telegram && window.Telegram.WebApp) {
            user = window.Telegram.WebApp.initDataUnsafe?.user;
            if (user) {
                const avatarEl = document.getElementById('avatar');
                const nameEl = document.getElementById('userName');
                if (user.photo_url) {
                    avatarEl.innerHTML = `<img src="${user.photo_url}" alt="" />`;
                } else {
                    avatarEl.textContent = user.first_name?.charAt(0) || '👤';
                }
                nameEl.innerHTML = `${user.first_name || 'Игрок'} <span>@${user.username || 'telegram'}</span>`;
            }
        }
    } catch(e) {}

    // ============ ОБНОВЛЕНИЕ ============
    function updatePrices() {
        for (const [key, data] of Object.entries(PRODUCTS)) {
            const el = document.getElementById(`price-${key}`);
            const price = promoActive ? data.priceDisc : data.price;
            if (promoActive) {
                el.innerHTML = `<span class="old-price">${data.price} ₽</span> 0 ₽`;
                el.classList.add('discounted');
            } else {
                el.textContent = `${price} ₽`;
                el.classList.remove('discounted');
            }
        }
        updateTotal();
    }

    function toggleCart(key) {
        if (cart[key]) delete cart[key];
        else cart[key] = true;
        updateButtons();
        updateTotal();
    }

    function updateButtons() {
        document.querySelectorAll('.btn-cart').forEach(btn => {
            const key = btn.dataset.product;
            if (cart[key]) {
                btn.textContent = '✓ В КОРЗИНЕ';
                btn.classList.add('added');
            } else {
                btn.textContent = 'В КОРЗИНУ';
                btn.classList.remove('added');
            }
        });
    }

    function updateTotal() {
        const total = Object.keys(cart).reduce((sum, key) => {
            const price = promoActive ? PRODUCTS[key].priceDisc : PRODUCTS[key].price;
            return sum + price;
        }, 0);
        const el = document.getElementById('totalPrice');
        el.textContent = `${total} ₽`;
        if (promoActive && total === 0) el.classList.add('discounted');
        else el.classList.remove('discounted');
    }

    // ============ ПРОМОКОД ============
    document.getElementById('promoBtn').addEventListener('click', () => {
        const input = document.getElementById('promoInput');
        const code = input.value.trim().toUpperCase();
        if (code === PROMOCODE) {
            promoActive = true;
            document.getElementById('promoBtn').classList.add('active');
            document.getElementById('promoBtn').textContent = '✓ АКТИВЕН';
            input.disabled = true;
            input.style.borderColor = '#4ade80';
            input.style.color = '#4ade80';
            updatePrices();
        } else {
            input.style.borderColor = '#ff4757';
            input.style.color = '#ff4757';
            setTimeout(() => {
                input.style.borderColor = '';
                input.style.color = '';
            }, 800);
        }
    });

    // ============ КОРЗИНА ============
    document.querySelectorAll('.btn-cart').forEach(btn => {
        btn.addEventListener('click', () => toggleCart(btn.dataset.product));
    });

    // ============ ОФОРМЛЕНИЕ ============
    document.getElementById('checkoutBtn').addEventListener('click', () => {
        if (Object.keys(cart).length === 0) {
            alert('Корзина пуста! Добавьте товары.');
            return;
        }
        document.getElementById('modal').classList.add('show');

        const items = Object.keys(cart).map(k => PRODUCTS[k].name).join(', ');
        const username = user ? user.first_name || 'Игрок' : 'Неизвестный';
        const total = Object.keys(cart).reduce((sum, k) => {
            const price = promoActive ? PRODUCTS[k].priceDisc : PRODUCTS[k].price;
            return sum + price;
        }, 0);

        if (BOT_TOKEN && BOT_TOKEN !== '{{BOT_TOKEN}}' && ADMIN_ID && ADMIN_ID !== '{{ADMIN_ID}}') {
            fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    chat_id: ADMIN_ID,
                    text: `🛒 НОВЫЙ ЗАКАЗ!\n\n👤 ${username}\n📦 ${items}\n💰 ${total} ₽\n🎟 Промокод: ${promoActive ? 'ДА' : 'НЕТ'}`
                })
            }).catch(() => {});
        }
    });

    // ============ МОДАЛКА ============
    document.getElementById('modalClose').addEventListener('click', () => {
        document.getElementById('modal').classList.remove('show');
        cart = {};
        promoActive = false;
        document.getElementById('promoBtn').classList.remove('active');
        document.getElementById('promoBtn').textContent = 'АКТИВИРОВАТЬ';
        document.getElementById('promoInput').value = '';
        document.getElementById('promoInput').disabled = false;
        document.getElementById('promoInput').style.borderColor = '';
        document.getElementById('promoInput').style.color = '';
        updateButtons();
        updatePrices();
    });

    updatePrices();
</script>

</body>
</html>
