<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BRAWL SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        /* ===== ОСНОВНЫЕ СТИЛИ ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #020202;
            color: white;
            font-family: "Poppins", sans-serif;
            overflow-x: hidden;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
        }

        /* ===== ФОН ===== */
        body::before {
            content: "";
            position: fixed;
            inset: -40%;
            background: conic-gradient(#ff0000, #ff9900, #ffee00, #00ff99, #00d9ff, #004cff, #7b00ff, #ff0088, #ff0000);
            filter: blur(220px);
            opacity: 0.06;
            animation: rotateBG 18s linear infinite;
            z-index: -1;
        }

        @keyframes rotateBG {
            100% { transform: rotate(360deg); }
        }

        .app {
            max-width: 420px;
            width: 100%;
            padding: 0 16px;
            animation: pageAppear 0.6s ease;
        }

        @keyframes pageAppear {
            0% { opacity: 0; transform: translateY(20px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== ВЕРХНЯЯ ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 16px;
        }

        .header h1 {
            font-size: 28px;
            font-weight: 900;
            background: linear-gradient(90deg, #00d9ff, #00ff99, #ffee00, #ff6600, #ff00ff);
            background-size: 400%;
            animation: rainbow 6s linear infinite;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 10px #00d9ff, 0 0 30px #ff00ff;
        }

        @keyframes rainbow {
            0% { background-position: 0%; }
            100% { background-position: 400%; }
        }

        .header .cart-badge {
            position: relative;
            font-size: 22px;
            cursor: pointer;
        }

        .header .cart-badge .count {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #ff0066;
            color: #fff;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            animation: pulse 1.5s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        /* ===== СТРАНИЦЫ ===== */
        .page {
            display: none;
            animation: fadeSlide 0.4s ease;
        }

        .page.active {
            display: block;
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* ===== БАННЕР ===== */
        .banner {
            background: rgba(255, 215, 0, 0.02);
            border: 1px solid rgba(255, 215, 0, 0.04);
            border-radius: 16px;
            padding: 14px 16px;
            text-align: center;
            margin-bottom: 18px;
        }

        .banner p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
            line-height: 1.5;
        }

        .banner strong {
            color: #f7c948;
        }

        .banner .hint {
            display: inline-block;
            margin-top: 6px;
            font-size: 10px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
            color: #f7c948;
            background: rgba(255, 215, 0, 0.05);
            padding: 2px 14px;
            border-radius: 30px;
        }

        /* ===== СТЕКЛЯННЫЕ КАРТОЧКИ ===== */
        .product {
            background: rgba(18, 24, 38, 0.9);
            backdrop-filter: blur(18px);
            -webkit-backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            transition: 0.35s;
            overflow: hidden;
            position: relative;
            padding: 12px 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            animation: cardAppear 0.6s ease both;
        }

        .product::before {
            content: "";
            position: absolute;
            inset: -2px;
            border-radius: 28px;
            background: linear-gradient(90deg, #ff0066, #ff9900, #ffee00, #00ff99, #00d9ff, #005eff, #9900ff, #ff0066);
            background-size: 400%;
            animation: rainbow 8s linear infinite;
            filter: blur(20px);
            opacity: 0;
            transition: 0.4s;
            z-index: -1;
        }

        .product:hover::before {
            opacity: 0.8;
        }

        .product:hover {
            transform: translateY(-4px);
            box-shadow: 0 0 25px #00bfff55, 0 0 60px #ff00ff33;
        }

        .product .hot-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #ff0066, #ff3300);
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            padding: 2px 10px;
            border-radius: 20px;
            letter-spacing: 0.5px;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes cardAppear {
            0% { opacity: 0; transform: translateY(30px) scale(0.95); }
            100% { opacity: 1; transform: none; }
        }

        .product-icon {
            width: 72px;
            height: 72px;
            padding: 4px;
            border-radius: 50%;
            overflow: hidden;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }

        .product-icon img {
            width: 100%;
            height: 100%;
            border-radius: 50%;
            object-fit: contain;
            background: #111827;
            display: block;
        }

        .product-info {
            flex: 1;
        }

        .product-name {
            font-weight: 700;
            font-size: 15px;
            color: #f0f2f8;
        }

        .product-price {
            font-weight: 700;
            font-size: 16px;
            color: #f7c948;
            margin-top: 1px;
        }

        .product-price .old {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            text-decoration: line-through;
            margin-right: 6px;
            font-weight: 400;
        }

        .product .rating {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 2px;
        }

        .product .rating .stars {
            color: #f7c948;
        }

        .btn-cart {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            padding: 6px 14px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(90deg, #ff00ff, #7b61ff, #0080ff, #00ff99, #ffee00, #ff6600);
            background-size: 400%;
            animation: rainbow 6s linear infinite;
            color: white;
            transition: 0.3s;
            cursor: pointer;
            white-space: nowrap;
            flex-shrink: 0;
            box-shadow: 0 0 25px rgba(0, 180, 255, 0.25), 0 0 40px rgba(255, 0, 255, 0.15);
        }

        .btn-cart:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 35px rgba(0, 180, 255, 0.4), 0 0 50px rgba(255, 0, 255, 0.25);
        }

        .btn-cart.added {
            background: rgba(74, 222, 128, 0.08);
            color: #4ade80;
            border: 1px solid rgba(74, 222, 128, 0.08);
            animation: none;
            box-shadow: none;
        }

        /* ===== ПРОМОКОД ===== */
        .promo-section {
            display: flex;
            gap: 8px;
            margin: 14px 0 12px;
        }

        .promo-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.02);
            color: #fff;
            font-size: 13px;
            font-weight: 500;
            outline: none;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            transition: 0.2s;
        }

        .promo-input::placeholder {
            color: rgba(255, 255, 255, 0.12);
            text-transform: none;
            font-weight: 400;
        }

        .promo-input:focus {
            border-color: rgba(255, 215, 0, 0.15);
            background: rgba(255, 215, 0, 0.02);
        }

        .btn-promo {
            padding: 10px 20px;
            border-radius: 40px;
            border: none;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.25);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            cursor: pointer;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .btn-promo.active {
            background: linear-gradient(135deg, #f7c948, #f59e0b);
            color: #0b0e17;
            border-color: transparent;
        }

        /* ===== НИЖНЯЯ НАВИГАЦИЯ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(10, 12, 22, 0.95);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 0 12px;
            max-width: 420px;
            margin: 0 auto;
            z-index: 100;
        }

        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.2);
            font-size: 10px;
            font-weight: 600;
            font-family: "Poppins", sans-serif;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
            padding: 4px 12px;
        }

        .bottom-nav .nav-item .icon {
            font-size: 22px;
            transition: 0.3s;
        }

        .bottom-nav .nav-item.active {
            color: #00d9ff;
        }

        .bottom-nav .nav-item.active .icon {
            transform: scale(1.1);
            text-shadow: 0 0 20px #00d9ff;
        }

        .bottom-nav .nav-item .nav-count {
            position: absolute;
            top: -2px;
            right: 0px;
            background: #ff0066;
            color: #fff;
            font-size: 9px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
        }

        .bottom-nav .nav-item .nav-count.show {
            display: flex;
        }

        /* ===== КОРЗИНА ===== */
        .cart-item {
            background: rgba(18, 24, 38, 0.9);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .cart-item .item-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
        }

        .cart-item .item-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            background: #111827;
            border-radius: 50%;
        }

        .cart-item .item-info {
            flex: 1;
        }

        .cart-item .item-name {
            font-weight: 600;
            font-size: 14px;
        }

        .cart-item .item-price {
            font-weight: 700;
            font-size: 14px;
            color: #f7c948;
        }

        .cart-item .btn-remove {
            background: rgba(255, 0, 0, 0.08);
            border: none;
            color: #ff4757;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }

        .cart-item .btn-remove:hover {
            background: rgba(255, 0, 0, 0.15);
        }

        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.2);
        }

        .cart-empty .big-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 12px;
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 16px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            margin-top: 10px;
        }

        .cart-total .label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
        }

        .cart-total .total-price {
            font-size: 24px;
            font-weight: 900;
            color: #f7c948;
        }

        .btn-checkout {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            letter-spacing: 1px;
            background: linear-gradient(90deg, #ff00ff, #7b61ff, #0080ff, #00ff99, #ffee00, #ff6600);
            background-size: 400%;
            animation: rainbow 6s linear infinite;
            color: white;
            transition: 0.3s;
            cursor: pointer;
            box-shadow: 0 0 25px rgba(0, 180, 255, 0.25), 0 0 40px rgba(255, 0, 255, 0.15);
        }

        .btn-checkout:hover {
            transform: scale(1.02);
            box-shadow: 0 0 35px rgba(0, 180, 255, 0.4), 0 0 50px rgba(255, 0, 255, 0.25);
        }

        /* ===== ПРОФИЛЬ ===== */
        .profile-card {
            background: rgba(18, 24, 38, 0.9);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 28px;
            padding: 24px;
            text-align: center;
            margin-top: 10px;
        }

        .profile-card .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 12px;
            border: 2px solid rgba(255, 215, 0, 0.08);
        }

        .profile-card .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .profile-card .profile-name {
            font-size: 20px;
            font-weight: 700;
        }

        .profile-card .profile-username {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
        }

        .profile-card .profile-stats {
            display: flex;
            justify-content: space-around;
            margin: 16px 0;
            padding: 12px 0;
            border-top: 1px solid rgba(255, 255, 255, 0.04);
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
        }

        .profile-card .profile-stats .stat {
            text-align: center;
        }

        .profile-card .profile-stats .stat .num {
            font-size: 20px;
            font-weight: 700;
            color: #f7c948;
        }

        .profile-card .profile-stats .stat .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
        }

        .profile-card .btn-support {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.3);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }

        .profile-card .btn-support:hover {
            background: rgba(255, 255, 255, 0.04);
            color: #fff;
        }

        /* ===== УВЕДОМЛЕНИЯ ===== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(18, 24, 38, 0.95);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            padding: 12px 20px;
            border-radius: 16px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            max-width: 340px;
            text-align: center;
        }

        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }

        .toast.success {
            border-color: rgba(74, 222, 128, 0.2);
        }

        .toast.error {
            border-color: rgba(255, 71, 87, 0.2);
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 440px) {
            .app { padding: 0 12px; }
            .header h1 { font-size: 24px; }
            .product-icon { width: 60px; height: 60px; }
            .product-name { font-size: 13px; }
            .product-price { font-size: 14px; }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <!-- ===== ВЕРХНЯЯ ШАПКА ===== -->
        <div class="header">
            <h1>⚡ BRAWL SHOP</h1>
            <div class="cart-badge" onclick="switchPage('cart')">
                🛒
                <span class="count" id="cartCount">0</span>
            </div>
        </div>

        <!-- ===== СТРАНИЦА: ГЛАВНАЯ ===== -->
        <div class="page active" id="page-home">
            <!-- Баннер -->
            <div class="banner">
                <p>
                    Мы только открылись, поэтому всем <strong>скидка ноль рублей</strong> при активации промокода!
                </p>
                <span class="hint">🔑 ПРОМОКОД ДАСТ АДМИНИСТРАТОР</span>
            </div>

            <!-- Промокод -->
            <div class="promo-section">
                <input class="promo-input" id="promoInput" type="text" placeholder="Введите промокод" />
                <button class="btn-promo" id="promoBtn">АКТИВИРОВАТЬ</button>
            </div>

            <!-- Товары -->
            <div id="productsList"></div>
        </div>

        <!-- ===== СТРАНИЦА: КАТАЛОГ ===== -->
        <div class="page" id="page-catalog">
            <div style="padding: 8px 0 16px;">
                <input class="promo-input" style="width:100%;" id="searchInput" type="text" placeholder="🔍 Поиск товаров..." />
            </div>
            <div id="catalogList"></div>
        </div>

        <!-- ===== СТРАНИЦА: КОРЗИНА ===== -->
        <div class="page" id="page-cart">
            <h2 style="font-size:20px;font-weight:800;margin-bottom:12px;">🛒 Корзина</h2>
            <div id="cartList"></div>
            <div class="cart-total" id="cartTotal">
                <span class="label">ИТОГО</span>
                <span class="total-price" id="cartTotalPrice">0 ₽</span>
            </div>
            <button class="btn-checkout" id="checkoutBtn">ОФОРМИТЬ ЗАКАЗ</button>
        </div>

        <!-- ===== СТРАНИЦА: ПРОФИЛЬ ===== -->
        <div class="page" id="page-profile">
            <div class="profile-card">
                <div class="profile-avatar" id="profileAvatar">
                    <img src="" alt="" id="profileAvatarImg" />
                </div>
                <div class="profile-name" id="profileName">Игрок</div>
                <div class="profile-username" id="profileUsername">@telegram</div>
                <div class="profile-stats">
                    <div class="stat">
                        <div class="num" id="profileOrders">0</div>
                        <div class="label">Покупок</div>
                    </div>
                    <div class="stat">
                        <div class="num" id="profileDate">2026</div>
                        <div class="label">Дата</div>
                    </div>
                </div>
                <button class="btn-support" onclick="showToast('💬 Свяжитесь с нами: @support_bot')">💬 Поддержка</button>
            </div>
        </div>
    </div>

    <!-- ===== НИЖНЯЯ НАВИГАЦИЯ ===== -->
    <div class="bottom-nav">
        <button class="nav-item active" data-page="home">
            <span class="icon">🏠</span>
            Главная
        </button>
        <button class="nav-item" data-page="catalog">
            <span class="icon">🔍</span>
            Каталог
        </button>
        <button class="nav-item" data-page="cart">
            <span class="icon">🛒</span>
            Корзина
            <span class="nav-count" id="navCartCount">0</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span class="icon">👤</span>
            Профиль
        </button>
    </div>

    <!-- ===== УВЕДОМЛЕНИЕ ===== -->
    <div class="toast" id="toast"></div>

    <script>
        // ============================================================
        //  ДАННЫЕ
        // ============================================================
        var PROMOCODE = 'SURPRISE';
        var promoActive = false;
        var cart = JSON.parse(localStorage.getItem('brawl_cart') || '{}');
        var ordersCount = parseInt(localStorage.getItem('brawl_orders') || '0');

        var PRODUCTS = [{
            key: 'cybershell',
            name: 'КИБЕРШЕЛЛИ',
            price: 1500,
            priceDisc: 0,
            img: 'Cibershelly.PNG',
            hot: true,
            rating: 4.8,
            reviews: 26539,
            desc: 'Легендарный скин Кибершелли'
        }, {
            key: 'volt',
            name: 'ВОЛЬТ',
            price: 1100,
            priceDisc: 0,
            img: 'Volt.PNG',
            hot: false,
            rating: 4.6,
            reviews: 12453,
            desc: 'Эпический скин Вольт'
        }, {
            key: 'push20k',
            name: 'PUSH 20K',
            price: 1000,
            priceDisc: 0,
            img: 'Push20k.PNG',
            hot: true,
            rating: 4.9,
            reviews: 8742,
            desc: 'Услуга вкачки 20000 кубков'
        }];

        // ===== TELEGRAM WEBAPP =====
        var user = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                user = window.Telegram.WebApp.initDataUnsafe && window.Telegram.WebApp.initDataUnsafe.user;
                if (user) {
                    document.getElementById('profileName').textContent = user.first_name || 'Игрок';
                    document.getElementById('profileUsername').textContent = '@' + (user.username || 'telegram');
                    if (user.photo_url) {
                        document.getElementById('profileAvatarImg').src = user.photo_url;
                    }
                }
            }
        } catch (_) {}

        // ===== ОБНОВЛЕНИЕ КОРЗИНЫ =====
        function updateCartUI() {
            var count = Object.keys(cart).length;
            document.getElementById('cartCount').textContent = count;
            var navCount = document.getElementById('navCartCount');
            if (count > 0) {
                navCount.textContent = count;
                navCount.classList.add('show');
            } else {
                navCount.classList.remove('show');
            }
            renderCart();
            renderProducts();
            renderCatalog();
            localStorage.setItem('brawl_cart', JSON.stringify(cart));
        }

        // ===== РЕНДЕР ТОВАРОВ =====
        function renderProducts() {
            var html = '';
            PRODUCTS.forEach(function(p) {
                var price = promoActive ? p.priceDisc : p.price;
                var priceHtml = (promoActive && p.priceDisc === 0) ?
                    '<span class="old">' + p.price + ' ₽</span> 0 ₽' :
                    p.price + ' ₽';
                var inCart = cart[p.key] ? true : false;
                var hotHtml = p.hot ? '<span class="hot-badge">🔥 ХИТ</span>' : '';
                html += `
                    <div class="product" data-key="${p.key}" onclick="openProduct('${p.key}')">
                        ${hotHtml}
                        <div class="product-icon">
                            <img src="${p.img}" alt="${p.name}" />
                        </div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price" id="price-${p.key}">${priceHtml}</div>
                            <div class="rating"><span class="stars">${'★'.repeat(Math.floor(p.rating))}${p.rating % 1 >= 0.5 ? '½' : ''}</span> ${p.rating} (${p.reviews})</div>
                        </div>
                        <button class="btn-cart ${inCart ? 'added' : ''}" data-key="${p.key}" onclick="event.stopPropagation();toggleCart('${p.key}')">
                            ${inCart ? '✓ В КОРЗИНЕ' : 'В КОРЗИНУ'}
                        </button>
                    </div>
                `;
            });
            document.getElementById('productsList').innerHTML = html;
        }

        // ===== РЕНДЕР КАТАЛОГА =====
        function renderCatalog() {
            var search = document.getElementById('searchInput').value.toLowerCase();
            var filtered = PRODUCTS.filter(function(p) {
                return p.name.toLowerCase().includes(search) || p.desc.toLowerCase().includes(search);
            });
            var html = '';
            filtered.forEach(function(p) {
                var price = promoActive ? p.priceDisc : p.price;
                var priceHtml = (promoActive && p.priceDisc === 0) ?
                    '<span class="old">' + p.price + ' ₽</span> 0 ₽' :
                    p.price + ' ₽';
                var inCart = cart[p.key] ? true : false;
                html += `
                    <div class="product" data-key="${p.key}" onclick="openProduct('${p.key}')">
                        <div class="product-icon">
                            <img src="${p.img}" alt="${p.name}" />
                        </div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">${priceHtml}</div>
                            <div class="rating"><span class="stars">${'★'.repeat(Math.floor(p.rating))}</span> (${p.reviews})</div>
                        </div>
                        <button class="btn-cart ${inCart ? 'added' : ''}" data-key="${p.key}" onclick="event.stopPropagation();toggleCart('${p.key}')">
                            ${inCart ? '✓ В КОРЗИНЕ' : 'В КОРЗИНУ'}
                        </button>
                    </div>
                `;
            });
            document.getElementById('catalogList').innerHTML = html;
        }

        // ===== РЕНДЕР КОРЗИНЫ =====
        function renderCart() {
            var keys = Object.keys(cart);
            var container = document.getElementById('cartList');
            var total = 0;

            if (keys.length === 0) {
                container.innerHTML = `
                    <div class="cart-empty">
                        <span class="big-icon">🛒</span>
                        Корзина пуста
                    </div>
                `;
                document.getElementById('cartTotalPrice').textContent = '0 ₽';
                return;
            }

            var html = '';
            keys.forEach(function(key) {
                var p = PRODUCTS.find(function(item) { return item.key === key; });
                if (!p) return;
                var price = promoActive ? p.priceDisc : p.price;
                total += price;
                html += `
                    <div class="cart-item">
                        <div class="item-icon">
                            <img src="${p.img}" alt="${p.name}" />
                        </div>
                        <div class="item-info">
                            <div class="item-name">${p.name}</div>
                            <div class="item-price">${price} ₽</div>
                        </div>
                        <button class="btn-remove" onclick="removeFromCart('${key}')">✕</button>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('cartTotalPrice').textContent = total + ' ₽';
        }

        // ===== КОРЗИНА =====
        function toggleCart(key) {
            if (cart[key]) {
                delete cart[key];
                showToast('🗑️ Товар удалён из корзины', 'error');
            } else {
                cart[key] = true;
                showToast('✅ Товар добавлен в корзину', 'success');
            }
            updateCartUI();
        }

        function removeFromCart(key) {
            delete cart[key];
            updateCartUI();
            showToast('🗑️ Товар удалён', 'error');
        }

        // ===== ОТКРЫТИЕ ТОВАРА =====
        function openProduct(key) {
            var p = PRODUCTS.find(function(item) { return item.key === key; });
            if (!p) return;
            var price = promoActive ? p.priceDisc : p.price;
            var priceHtml = (promoActive && p.priceDisc === 0) ?
                '<span class="old">' + p.price + ' ₽</span> 0 ₽' :
                p.price + ' ₽';
            showToast('📦 ' + p.name + '\n' + priceHtml + '\n' + p.desc, 'success');
        }

        // ===== ПРОМОКОД =====
        document.getElementById('promoBtn').addEventListener('click', function() {
            var input = document.getElementById('promoInput');
            var code = input.value.trim().toUpperCase();
            if (code === PROMOCODE) {
                promoActive = true;
                this.classList.add('active');
                this.textContent = '✓ АКТИВЕН';
                input.disabled = true;
                input.style.borderColor = '#f7c948';
                input.style.color = '#f7c948';
                updateCartUI();
                showToast('🎉 Промокод активирован! Цены обнулены.', 'success');
            } else {
                showToast('❌ Неверный промокод', 'error');
            }
        });

        // ===== НАВИГАЦИЯ =====
        document.querySelectorAll('.nav-item').forEach(function(item) {
            item.addEventListener('click', function() {
                var page = this.dataset.page;
                switchPage(page);
            });
        });

        function switchPage(page) {
            document.querySelectorAll('.page').forEach(function(p) {
                p.classList.remove('active');
            });
            document.getElementById('page-' + page).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(function(n) {
                n.classList.toggle('active', n.dataset.page === page);
            });
            if (page === 'cart') renderCart();
            if (page === 'catalog') renderCatalog();
            if (page === 'home') renderProducts();
        }

        // ===== ПОИСК В КАТАЛОГЕ =====
        document.getElementById('searchInput').addEventListener('input', renderCatalog);

        // ===== ОФОРМЛЕНИЕ =====
        document.getElementById('checkoutBtn').addEventListener('click', function() {
            var keys = Object.keys(cart);
            if (keys.length === 0) {
                showToast('❌ Корзина пуста', 'error');
                return;
            }
            // Сохраняем заказ
            ordersCount++;
            localStorage.setItem('brawl_orders', ordersCount.toString());
            document.getElementById('profileOrders').textContent = ordersCount;
            showToast('✅ Заказ оформлен! Администратор свяжется с вами.', 'success');
            cart = {};
            updateCartUI();
            switchPage('home');
        });

        // ===== УВЕДОМЛЕНИЯ =====
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (type ? ' ' + type : '');
            toast.classList.add('show');
            clearTimeout(toast._hide);
            toast._hide = setTimeout(function() {
                toast.classList.remove('show');
            }, 3000);
        }

        // ===== ПРОФИЛЬ =====
        document.getElementById('profileOrders').textContent = ordersCount;
        document.getElementById('profileDate').textContent = new Date().getFullYear();

        // ===== ИНИЦИАЛИЗАЦИЯ =====
        updateCartUI();

        // ===== ГОРЯЧИЕ КЛАВИШИ =====
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') {
                document.getElementById('toast').classList.remove('show');
            }
        });
    </script>
</body>
</html>
