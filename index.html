<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BRAWL SHOP</title>
    <style>
        /* ВЕСЬ ТВОЙ CSS (стили) */
    </style>
</head>
<body>

    <!-- ВЕСЬ ТВОЙ HTML (шапка, товары, кнопки) -->

    <script>
        // ============================================================
        //  ТВОЙ ПРОМОКОД (ПОМЕНЯЙ ЗДЕСЬ)
        // ============================================================
        const PROMOCODE = 'SURPRISE';   // 👈 ПРОМОКОД (БОЛЬШИМИ БУКВАМИ)

        // ============================================================
        //  ТОВАРЫ
        // ============================================================
        const PRODUCTS = {
            cybershell: { name: 'КИБЕРШЕЛЛИ', price: 1500, priceDisc: 0 },
            volt: { name: 'ВОЛЬТ', price: 1100, priceDisc: 0 },
            push20k: { name: 'PUSH 20K', price: 1000, priceDisc: 0 }
        };

        let promoActive = false;
        let cart = {};

        // ===== TELEGRAM WEBAPP =====
        let user = null;
        try {
            if (window.Telegram?.WebApp) {
                user = window.Telegram.WebApp.initDataUnsafe?.user;
                if (user) {
                    const avatarEl = document.getElementById('avatar');
                    const nameEl = document.getElementById('userName');
                    if (user.photo_url) {
                        avatarEl.innerHTML = `<img src="${user.photo_url}" alt="" />`;
                    } else {
                        avatarEl.textContent = user.first_name?.charAt(0) || '👤';
                    }
                    nameEl.innerHTML = `${user.first_name || 'Игрок'} <span>@${user.username || 'telegram'}</span>`;
                }
            }
        } catch (_) {}

        // ===== ОБНОВЛЕНИЕ ЦЕН =====
        function updatePrices() {
            for (const [key, data] of Object.entries(PRODUCTS)) {
                const el = document.getElementById(`price-${key}`);
                if (!el) continue;
                if (promoActive) {
                    el.innerHTML = `<span class="old">${data.price} ₽</span> 0 ₽`;
                } else {
                    el.textContent = `${data.price} ₽`;
                }
            }
            updateTotal();
        }

        function updateButtons() {
            document.querySelectorAll('.btn-cart').forEach(btn => {
                const key = btn.dataset.key;
                if (cart[key]) {
                    btn.textContent = '✓ В КОРЗИНЕ';
                    btn.classList.add('added');
                } else {
                    btn.textContent = 'В КОРЗИНУ';
                    btn.classList.remove('added');
                }
            });
        }

        function updateTotal() {
            const total = Object.keys(cart).reduce((sum, key) => {
                const p = promoActive ? PRODUCTS[key].priceDisc : PRODUCTS[key].price;
                return sum + p;
            }, 0);
            const totalEl = document.getElementById('totalPrice');
            if (totalEl) totalEl.textContent = `${total} ₽`;
        }

        // ===== КОРЗИНА =====
        document.querySelectorAll('.btn-cart').forEach(btn => {
            btn.addEventListener('click', () => {
                const key = btn.dataset.key;
                if (cart[key]) delete cart[key];
                else cart[key] = true;
                updateButtons();
                updateTotal();
            });
        });

        // ===== ПРОМОКОД =====
        document.getElementById('promoBtn').addEventListener('click', function() {
            const input = document.getElementById('promoInput');
            let code = input.value.trim().toUpperCase();

            console.log('Введён код:', code);
            console.log('Ожидается:', PROMOCODE);

            if (code === PROMOCODE) {
                promoActive = true;
                this.classList.add('active');
                this.textContent = '✓ АКТИВЕН';
                input.disabled = true;
                input.style.borderColor = '#f7c948';
                input.style.color = '#f7c948';
                updatePrices();
                alert('✅ Промокод активирован! Цены обнулены.');
            } else {
                input.style.borderColor = '#ff4757';
                input.style.color = '#ff4757';
                alert('❌ Неверный промокод. Попробуйте ещё раз.');
                setTimeout(() => {
                    input.style.borderColor = '';
                    input.style.color = '';
                }, 700);
            }
        });

        // ===== ОФОРМЛЕНИЕ =====
        document.getElementById('checkoutBtn').addEventListener('click', () => {
            if (Object.keys(cart).length === 0) {
                alert('Корзина пуста!');
                return;
            }
            document.getElementById('modal').classList.add('show');

            const items = Object.keys(cart).map(k => PRODUCTS[k].name).join(', ');
            const username = user?.first_name || 'Игрок';
            const total = Object.keys(cart).reduce((sum, k) => {
                const p = promoActive ? PRODUCTS[k].priceDisc : PRODUCTS[k].price;
                return sum + p;
            }, 0);

            const BOT_TOKEN = '{{BOT_TOKEN}}';
            const ADMIN_ID = '{{ADMIN_ID}}';
            if (BOT_TOKEN && BOT_TOKEN !== '{{BOT_TOKEN}}' && ADMIN_ID && ADMIN_ID !== '{{ADMIN_ID}}') {
                fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        chat_id: ADMIN_ID,
                        text: `🛒 НОВЫЙ ЗАКАЗ!\n👤 ${username}\n📦 ${items}\n💰 ${total} ₽\n🎟 Промокод: ${promoActive ? 'ДА' : 'НЕТ'}`
                    })
                }).catch(() => {});
            }
        });

        // ===== МОДАЛКА =====
        document.getElementById('modalClose').addEventListener('click', () => {
            document.getElementById('modal').classList.remove('show');
            cart = {};
            promoActive = false;
            document.getElementById('promoBtn').classList.remove('active');
            document.getElementById('promoBtn').textContent = 'АКТИВИРОВАТЬ';
            document.getElementById('promoInput').value = '';
            document.getElementById('promoInput').disabled = false;
            document.getElementById('promoInput').style.borderColor = '';
            document.getElementById('promoInput').style.color = '';
            updateButtons();
            updatePrices();
        });

        updatePrices();
    </script>

</body>
</html>
