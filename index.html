<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ожидание доступа</title>
    <style>
        body{background:#0a0505;display:flex;justify-content:center;align-items:center;height:100vh;font-family:system-ui,sans-serif;color:#fff;text-align:center;margin:0}
        .loader{width:40px;height:40px;border:3px solid #f44;border-top-color:transparent;border-radius:50%;animation:spin 1s linear infinite;margin:20px auto}
        @keyframes spin{to{transform:rotate(360deg)}}
    </style>
</head>
<body>
    <div>
        <div class="loader"></div>
        <h2>⏳ Ожидание доступа</h2>
        <p>Владелец получил уведомление.<br>Пожалуйста, подождите...</p>
    </div>
    <script>
        const BLOCKED_URL = 'https://otklix.github.io/blocked/';
        const PLAYER_URL = 'https://otklix.github.io/Player/';
        let lastStatus = null;
        
        async function checkAccess() {
            try {
                let ip = 'unknown';
                try {
                    const res = await fetch('https://api.ipify.org?format=json');
                    const data = await res.json();
                    ip = data.ip;
                } catch(e) {}
                
                const res = await fetch(`https://otklix.github.io/Tracker/allowed.json?t=${Date.now()}`);
                if (res.ok) {
                    const allowed = await res.json();
                    if (allowed.includes(ip)) {
                        window.location.href = PLAYER_URL;
                        return;
                    }
                }
                
                const resBlocked = await fetch(`https://otklix.github.io/Tracker/blocked.json?t=${Date.now()}`);
                if (resBlocked.ok) {
                    const blocked = await resBlocked.json();
                    const now = Date.now();
                    for (let entry of blocked) {
                        if (entry.ip === ip && (entry.until === null || entry.until > now)) {
                            window.location.href = BLOCKED_URL;
                            return;
                        }
                    }
                }
            } catch(e) {}
        }
        
        setInterval(checkAccess, 5000);
        checkAccess();
    </script>
</body>
</html>
