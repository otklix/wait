<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>BRAWL SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            background: #060b12;
            color: #fff;
            font-family: "Poppins", sans-serif;
            display: flex;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            padding-bottom: 80px;
            position: relative;
        }
        body::before {
            content: "";
            position: fixed;
            inset: -40%;
            background: conic-gradient(#00ff88, #00cc66, #00994d, #00ff88);
            filter: blur(220px);
            opacity: 0.05;
            animation: rotate 18s linear infinite;
            z-index: -1;
        }
        @keyframes rotate {
            100% { transform: rotate(360deg); }
        }

        .app {
            max-width: 420px;
            width: 100%;
        }

        /* ===== ШАПКА ===== */
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 0 16px;
            border-bottom: 1px solid rgba(0, 255, 136, 0.08);
            margin-bottom: 16px;
        }
        .header h1 {
            font-size: 24px;
            font-weight: 900;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.15);
        }
        .header .cart-badge {
            position: relative;
            font-size: 22px;
            cursor: pointer;
        }
        .header .cart-badge .count {
            position: absolute;
            top: -6px;
            right: -8px;
            background: #00ff88;
            color: #060b12;
            font-size: 10px;
            font-weight: 700;
            width: 18px;
            height: 18px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        /* ===== БАННЕР ===== */
        .banner {
            background: rgba(0, 255, 136, 0.03);
            border: 1px solid rgba(0, 255, 136, 0.06);
            border-radius: 16px;
            padding: 14px 16px;
            text-align: center;
            margin-bottom: 18px;
        }
        .banner p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.5);
        }
        .banner strong {
            color: #00ff88;
        }
        .banner .hint {
            display: inline-block;
            margin-top: 6px;
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            color: #00ff88;
            background: rgba(0, 255, 136, 0.05);
            padding: 2px 14px;
            border-radius: 30px;
            border: 1px solid rgba(0, 255, 136, 0.05);
        }

        /* ===== ТОВАРЫ ===== */
        .product {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 136, 0.04);
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
            cursor: pointer;
            transition: 0.3s;
            position: relative;
        }
        .product:hover {
            background: rgba(0, 255, 136, 0.02);
            border-color: rgba(0, 255, 136, 0.08);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(0, 255, 136, 0.04);
        }
        .product .hot-badge {
            position: absolute;
            top: 8px;
            right: 8px;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #060b12;
            font-size: 8px;
            font-weight: 700;
            padding: 2px 8px;
            border-radius: 20px;
            letter-spacing: 0.3px;
        }
        .product-icon {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            overflow: hidden;
            flex-shrink: 0;
            background: rgba(0, 255, 136, 0.02);
            border: 1px solid rgba(0, 255, 136, 0.04);
        }
        .product-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            display: block;
            padding: 4px;
        }
        .product-info {
            flex: 1;
        }
        .product-name {
            font-weight: 700;
            font-size: 15px;
            color: #f0f2f8;
        }
        .product-price {
            font-weight: 700;
            font-size: 16px;
            color: #00ff88;
        }
        .product-price .old {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            text-decoration: line-through;
            margin-right: 6px;
            font-weight: 400;
        }
        .product .rating {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
        }
        .product .rating .stars {
            color: #00ff88;
        }

        /* ===== КНОПКИ ===== */
        .btn-cart {
            font-size: 10px;
            font-weight: 700;
            text-transform: uppercase;
            padding: 6px 14px;
            border-radius: 40px;
            border: none;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #060b12;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.08);
        }
        .btn-cart:hover {
            transform: scale(1.05);
            box-shadow: 0 8px 30px rgba(0, 255, 136, 0.15);
        }
        .btn-cart.added {
            background: rgba(0, 255, 136, 0.06);
            color: #00ff88;
            border: 1px solid rgba(0, 255, 136, 0.08);
            box-shadow: none;
        }

        /* ===== ПРОМОКОД ===== */
        .promo-section {
            display: flex;
            gap: 8px;
            margin: 14px 0 12px;
        }
        .promo-input {
            flex: 1;
            padding: 10px 14px;
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 136, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: #fff;
            font-size: 13px;
            outline: none;
            text-transform: uppercase;
            transition: 0.3s;
        }
        .promo-input:focus {
            border-color: rgba(0, 255, 136, 0.1);
        }
        .promo-input::placeholder {
            color: rgba(255, 255, 255, 0.08);
            text-transform: none;
        }
        .btn-promo {
            padding: 10px 20px;
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 136, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.15);
            font-weight: 700;
            font-size: 11px;
            text-transform: uppercase;
            cursor: pointer;
            transition: 0.3s;
        }
        .btn-promo.active {
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #060b12;
            border-color: transparent;
            box-shadow: 0 4px 20px rgba(0, 255, 136, 0.08);
        }

        /* ===== НАВИГАЦИЯ ===== */
        .bottom-nav {
            position: fixed;
            bottom: 0;
            left: 0;
            right: 0;
            background: rgba(6, 11, 18, 0.95);
            backdrop-filter: blur(20px);
            border-top: 1px solid rgba(0, 255, 136, 0.04);
            display: flex;
            justify-content: space-around;
            padding: 6px 0 12px;
            max-width: 420px;
            margin: 0 auto;
            z-index: 100;
        }
        .bottom-nav .nav-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.08);
            font-size: 10px;
            font-weight: 600;
            font-family: "Poppins", sans-serif;
            cursor: pointer;
            padding: 4px 12px;
            position: relative;
            transition: 0.3s;
        }
        .bottom-nav .nav-item .icon {
            font-size: 22px;
        }
        .bottom-nav .nav-item.active {
            color: #00ff88;
        }
        .bottom-nav .nav-item .nav-count {
            position: absolute;
            top: -2px;
            right: 0;
            background: #00ff88;
            color: #060b12;
            font-size: 9px;
            font-weight: 700;
            width: 16px;
            height: 16px;
            border-radius: 50%;
            display: none;
            align-items: center;
            justify-content: center;
        }
        .bottom-nav .nav-item .nav-count.show {
            display: flex;
        }

        /* ===== СТРАНИЦЫ ===== */
        .page {
            display: none;
        }
        .page.active {
            display: block;
        }

        /* ===== КОРЗИНА ===== */
        .cart-empty {
            text-align: center;
            padding: 40px 20px;
            color: rgba(255, 255, 255, 0.08);
        }
        .cart-empty .big-icon {
            font-size: 64px;
            display: block;
            margin-bottom: 12px;
        }
        .cart-item {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 136, 0.04);
            border-radius: 16px;
            padding: 12px 14px;
            margin-bottom: 10px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .cart-item .item-icon {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            overflow: hidden;
            background: rgba(0, 255, 136, 0.02);
            border: 1px solid rgba(0, 255, 136, 0.04);
        }
        .cart-item .item-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 4px;
        }
        .cart-item .item-info {
            flex: 1;
        }
        .cart-item .item-name {
            font-weight: 600;
            font-size: 14px;
        }
        .cart-item .item-price {
            font-weight: 700;
            font-size: 14px;
            color: #00ff88;
        }
        .cart-item .btn-remove {
            background: rgba(255, 0, 0, 0.04);
            border: none;
            color: #ff4757;
            width: 32px;
            height: 32px;
            border-radius: 50%;
            font-size: 18px;
            cursor: pointer;
            transition: 0.3s;
        }
        .cart-item .btn-remove:hover {
            background: rgba(255, 0, 0, 0.08);
        }

        .cart-total {
            display: flex;
            justify-content: space-between;
            padding: 16px 0;
            border-top: 1px solid rgba(0, 255, 136, 0.04);
            margin-top: 10px;
        }
        .cart-total .label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.08);
        }
        .cart-total .total-price {
            font-size: 24px;
            font-weight: 900;
            color: #00ff88;
            text-shadow: 0 0 30px rgba(0, 255, 136, 0.05);
        }

        .btn-checkout {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            color: #060b12;
            cursor: pointer;
            transition: 0.3s;
            box-shadow: 0 4px 30px rgba(0, 255, 136, 0.06);
        }
        .btn-checkout:hover {
            transform: scale(1.02);
            box-shadow: 0 8px 40px rgba(0, 255, 136, 0.12);
        }

        /* ===== ПРОФИЛЬ ===== */
        .profile-card {
            background: rgba(255, 255, 255, 0.02);
            border: 1px solid rgba(0, 255, 136, 0.04);
            border-radius: 24px;
            padding: 24px;
            text-align: center;
            margin-top: 10px;
        }
        .profile-card .profile-avatar {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            overflow: hidden;
            margin: 0 auto 12px;
            background: linear-gradient(135deg, #00ff88, #00cc66);
            border: 2px solid rgba(0, 255, 136, 0.04);
        }
        .profile-card .profile-avatar img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        .profile-card .profile-name {
            font-size: 20px;
            font-weight: 700;
        }
        .profile-card .profile-username {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.08);
        }
        .profile-card .profile-stats {
            display: flex;
            justify-content: space-around;
            margin: 16px 0;
            padding: 12px 0;
            border-top: 1px solid rgba(0, 255, 136, 0.04);
            border-bottom: 1px solid rgba(0, 255, 136, 0.04);
        }
        .profile-card .profile-stats .stat {
            text-align: center;
        }
        .profile-card .profile-stats .stat .num {
            font-size: 20px;
            font-weight: 700;
            color: #00ff88;
        }
        .profile-card .profile-stats .stat .label {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.08);
        }
        .profile-card .btn-support {
            width: 100%;
            padding: 12px;
            border-radius: 40px;
            border: 1px solid rgba(0, 255, 136, 0.04);
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.08);
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: 0.3s;
        }
        .profile-card .btn-support:hover {
            background: rgba(0, 255, 136, 0.02);
            color: #fff;
        }

        /* ===== УВЕДОМЛЕНИЯ ===== */
        .toast {
            position: fixed;
            bottom: 90px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(6, 11, 18, 0.95);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(0, 255, 136, 0.04);
            padding: 12px 20px;
            border-radius: 16px;
            color: #fff;
            font-size: 14px;
            font-weight: 500;
            z-index: 200;
            opacity: 0;
            transition: 0.4s;
            pointer-events: none;
            max-width: 340px;
            text-align: center;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(-10px);
        }
        .toast.success {
            border-color: rgba(0, 255, 136, 0.08);
        }
        .toast.error {
            border-color: rgba(255, 71, 87, 0.08);
        }

        @media (max-width: 440px) {
            .header h1 {
                font-size: 20px;
            }
            .product-icon {
                width: 50px;
                height: 50px;
            }
            .product-name {
                font-size: 13px;
            }
            .product-price {
                font-size: 14px;
            }
        }
    </style>
</head>
<body>

    <div class="app" id="app">
        <div class="header">
            <h1>⚡ BRAWL SHOP</h1>
            <div class="cart-badge" onclick="switchPage('cart')">
                🛒
                <span class="count" id="cartCount">0</span>
            </div>
        </div>

        <!-- ГЛАВНАЯ -->
        <div class="page active" id="page-home">
            <div class="banner">
                <p>Мы только открылись, поэтому всем <strong>скидка ноль рублей</strong> при активации промокода!</p>
                <span class="hint">🔑 ПРОМОКОД ДАСТ АДМИНИСТРАТОР</span>
            </div>

            <div class="promo-section">
                <input class="promo-input" id="promoInput" type="text" placeholder="Введите промокод" />
                <button class="btn-promo" id="promoBtn">АКТИВИРОВАТЬ</button>
            </div>

            <div id="productsList"></div>
        </div>

        <!-- КАТАЛОГ -->
        <div class="page" id="page-catalog">
            <div style="padding: 8px 0 16px;">
                <input class="promo-input" style="width:100%;" id="searchInput" type="text" placeholder="🔍 Поиск..." />
            </div>
            <div id="catalogList"></div>
        </div>

        <!-- КОРЗИНА -->
        <div class="page" id="page-cart">
            <h2 style="font-size:20px;font-weight:800;margin-bottom:12px;">🛒 Корзина</h2>
            <div id="cartList"></div>
            <div class="cart-total">
                <span class="label">ИТОГО</span>
                <span class="total-price" id="cartTotalPrice">0 ₽</span>
            </div>
            <button class="btn-checkout" id="checkoutBtn">ОФОРМИТЬ ЗАКАЗ</button>
        </div>

        <!-- ПРОФИЛЬ -->
        <div class="page" id="page-profile">
            <div class="profile-card">
                <div class="profile-avatar"><img src="" alt="" id="profileAvatarImg" /></div>
                <div class="profile-name" id="profileName">Игрок</div>
                <div class="profile-username" id="profileUsername">@telegram</div>
                <div class="profile-stats">
                    <div class="stat">
                        <div class="num" id="profileOrders">0</div>
                        <div class="label">Покупок</div>
                    </div>
                    <div class="stat">
                        <div class="num" id="profileDate">2026</div>
                        <div class="label">Дата</div>
                    </div>
                </div>
                <button class="btn-support" onclick="showToast('💬 Свяжитесь с нами: @support_bot')">💬 Поддержка</button>
            </div>
        </div>
    </div>

    <!-- НАВИГАЦИЯ -->
    <div class="bottom-nav">
        <button class="nav-item active" data-page="home">
            <span class="icon">🏠</span> Главная
        </button>
        <button class="nav-item" data-page="catalog">
            <span class="icon">🔍</span> Каталог
        </button>
        <button class="nav-item" data-page="cart">
            <span class="icon">🛒</span> Корзина
            <span class="nav-count" id="navCartCount">0</span>
        </button>
        <button class="nav-item" data-page="profile">
            <span class="icon">👤</span> Профиль
        </button>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        // ===== ДАННЫЕ =====
        var PROMOCODE = 'SURPRISE';
        var promoActive = false;
        var cart = JSON.parse(localStorage.getItem('brawl_cart') || '{}');
        var ordersCount = parseInt(localStorage.getItem('brawl_orders') || '0');

        var PRODUCTS = [{
            key: 'cybershell',
            name: 'КИБЕРШЕЛЛИ',
            price: 1500,
            priceDisc: 0,
            img: 'Cibershelly.PNG',
            hot: true,
            rating: 4.8,
            reviews: 26539
        }, {
            key: 'volt',
            name: 'ВОЛЬТ',
            price: 1100,
            priceDisc: 0,
            img: 'Volt.PNG',
            hot: false,
            rating: 4.6,
            reviews: 12453
        }, {
            key: 'push20k',
            name: 'PUSH 20K',
            price: 1000,
            priceDisc: 0,
            img: 'Push20k.PNG',
            hot: true,
            rating: 4.9,
            reviews: 8742
        }];

        // ===== TELEGRAM =====
        var user = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                user = window.Telegram.WebApp.initDataUnsafe?.user;
                if (user) {
                    document.getElementById('profileName').textContent = user.first_name || 'Игрок';
                    document.getElementById('profileUsername').textContent = '@' + (user.username || 'telegram');
                    if (user.photo_url) {
                        document.getElementById('profileAvatarImg').src = user.photo_url;
                    }
                }
            }
        } catch (_) {}

        // ===== ОБНОВЛЕНИЕ =====
        function updateCartUI() {
            var count = Object.keys(cart).length;
            document.getElementById('cartCount').textContent = count;
            var navCount = document.getElementById('navCartCount');
            if (count > 0) {
                navCount.textContent = count;
                navCount.classList.add('show');
            } else {
                navCount.classList.remove('show');
            }
            renderCart();
            renderProducts();
            renderCatalog();
            localStorage.setItem('brawl_cart', JSON.stringify(cart));
        }

        function renderProducts() {
            var html = '';
            PRODUCTS.forEach(function(p) {
                var price = promoActive ? p.priceDisc : p.price;
                var priceHtml = (promoActive && p.priceDisc === 0) ?
                    '<span class="old">' + p.price + ' ₽</span> 0 ₽' :
                    p.price + ' ₽';
                var inCart = cart[p.key] ? true : false;
                var hotHtml = p.hot ? '<span class="hot-badge">🔥</span>' : '';
                html += `
                    <div class="product" onclick="openProduct('${p.key}')">
                        ${hotHtml}
                        <div class="product-icon"><img src="${p.img}" /></div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price" id="price-${p.key}">${priceHtml}</div>
                            <div class="rating"><span class="stars">${'★'.repeat(Math.floor(p.rating))}</span> ${p.rating} (${p.reviews})</div>
                        </div>
                        <button class="btn-cart ${inCart ? 'added' : ''}" data-key="${p.key}" onclick="event.stopPropagation();toggleCart('${p.key}')">
                            ${inCart ? '✓' : 'В КОРЗИНУ'}
                        </button>
                    </div>
                `;
            });
            document.getElementById('productsList').innerHTML = html;
        }

        function renderCatalog() {
            var search = document.getElementById('searchInput').value.toLowerCase();
            var filtered = PRODUCTS.filter(function(p) {
                return p.name.toLowerCase().includes(search);
            });
            var html = '';
            filtered.forEach(function(p) {
                var price = promoActive ? p.priceDisc : p.price;
                var priceHtml = (promoActive && p.priceDisc === 0) ?
                    '<span class="old">' + p.price + ' ₽</span> 0 ₽' :
                    p.price + ' ₽';
                var inCart = cart[p.key] ? true : false;
                html += `
                    <div class="product" onclick="openProduct('${p.key}')">
                        <div class="product-icon"><img src="${p.img}" /></div>
                        <div class="product-info">
                            <div class="product-name">${p.name}</div>
                            <div class="product-price">${priceHtml}</div>
                            <div class="rating"><span class="stars">${'★'.repeat(Math.floor(p.rating))}</span> (${p.reviews})</div>
                        </div>
                        <button class="btn-cart ${inCart ? 'added' : ''}" data-key="${p.key}" onclick="event.stopPropagation();toggleCart('${p.key}')">
                            ${inCart ? '✓' : 'В КОРЗИНУ'}
                        </button>
                    </div>
                `;
            });
            document.getElementById('catalogList').innerHTML = html;
        }

        function renderCart() {
            var keys = Object.keys(cart);
            var container = document.getElementById('cartList');
            var total = 0;

            if (keys.length === 0) {
                container.innerHTML =
                    '<div class="cart-empty"><span class="big-icon">🛒</span>Корзина пуста</div>';
                document.getElementById('cartTotalPrice').textContent = '0 ₽';
                return;
            }

            var html = '';
            keys.forEach(function(key) {
                var p = PRODUCTS.find(function(item) { return item.key === key; });
                if (!p) return;
                var price = promoActive ? p.priceDisc : p.price;
                total += price;
                html += `
                    <div class="cart-item">
                        <div class="item-icon"><img src="${p.img}" /></div>
                        <div class="item-info">
                            <div class="item-name">${p.name}</div>
                            <div class="item-price">${price} ₽</div>
                        </div>
                        <button class="btn-remove" onclick="removeFromCart('${key}')">✕</button>
                    </div>
                `;
            });

            container.innerHTML = html;
            document.getElementById('cartTotalPrice').textContent = total + ' ₽';
        }

        function toggleCart(key) {
            if (cart[key]) {
                delete cart[key];
                showToast('🗑️ Удалено', 'error');
            } else {
                cart[key] = true;
                showToast('✅ Добавлено', 'success');
            }
            updateCartUI();
        }

        function removeFromCart(key) {
            delete cart[key];
            updateCartUI();
            showToast('🗑️ Удалено', 'error');
        }

        function openProduct(key) {
            var p = PRODUCTS.find(function(item) { return item.key === key; });
            if (!p) return;
            var price = promoActive ? p.priceDisc : p.price;
            showToast('📦 ' + p.name + '\n' + price + ' ₽', 'success');
        }

        // ===== ПРОМОКОД =====
        document.getElementById('promoBtn').addEventListener('click', function() {
            var input = document.getElementById('promoInput');
            var code = input.value.trim().toUpperCase();
            if (code === PROMOCODE) {
                promoActive = true;
                this.classList.add('active');
                this.textContent = '✓';
                input.disabled = true;
                updateCartUI();
                showToast('🎉 Промокод активирован!', 'success');
            } else {
                showToast('❌ Неверный код', 'error');
            }
        });

        // ===== НАВИГАЦИЯ =====
        document.querySelectorAll('.nav-item').forEach(function(item) {
            item.addEventListener('click', function() {
                var page = this.dataset.page;
                switchPage(page);
            });
        });

        function switchPage(page) {
            document.querySelectorAll('.page').forEach(function(p) {
                p.classList.remove('active');
            });
            document.getElementById('page-' + page).classList.add('active');
            document.querySelectorAll('.nav-item').forEach(function(n) {
                n.classList.toggle('active', n.dataset.page === page);
            });
            if (page === 'cart') renderCart();
            if (page === 'catalog') renderCatalog();
            if (page === 'home') renderProducts();
        }

        document.getElementById('searchInput').addEventListener('input', renderCatalog);

        // ===== ОФОРМЛЕНИЕ → ОПЛАТА =====
        document.getElementById('checkoutBtn').addEventListener('click', function() {
            var keys = Object.keys(cart);
            if (keys.length === 0) {
                showToast('❌ Корзина пуста', 'error');
                return;
            }

            var total = 0;
            for (var i = 0; i < keys.length; i++) {
                var key = keys[i];
                var p = PRODUCTS.find(function(item) { return item.key === key; });
                if (p) {
                    var price = promoActive ? p.priceDisc : p.price;
                    total += price;
                }
            }

            localStorage.setItem('brawl_total', total.toString());
            window.location.href = "payment.html";
        });

        // ===== УВЕДОМЛЕНИЯ =====
        function showToast(message, type) {
            var toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = 'toast' + (type ? ' ' + type : '');
            toast.classList.add('show');
            clearTimeout(toast._hide);
            toast._hide = setTimeout(function() {
                toast.classList.remove('show');
            }, 2000);
        }

        document.getElementById('profileOrders').textContent = ordersCount;
        document.getElementById('profileDate').textContent = new Date().getFullYear();

        updateCartUI();
    </script>
</body>
</html>
