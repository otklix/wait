<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Оплата — BRAWL SHOP</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #020202;
            color: white;
            font-family: "Poppins", sans-serif;
            display: flex;
            justify-content: center;
            padding: 20px;
            min-height: 100vh;
        }

        .app {
            max-width: 420px;
            width: 100%;
        }

        .header {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 0 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.04);
            margin-bottom: 16px;
        }

        .header .back {
            background: none;
            border: none;
            color: rgba(255, 255, 255, 0.3);
            font-size: 24px;
            cursor: pointer;
        }

        .header h1 {
            font-size: 20px;
            font-weight: 800;
            flex: 1;
        }

        .payment-amount {
            background: rgba(18, 24, 38, 0.9);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px;
            text-align: center;
            margin-bottom: 20px;
        }

        .payment-amount .label {
            font-size: 14px;
            color: rgba(255, 255, 255, 0.3);
        }

        .payment-amount .amount {
            font-size: 36px;
            font-weight: 900;
            color: #f7c948;
        }

        .payment-amount .order-id {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            margin-top: 4px;
        }

        .bank-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin-bottom: 20px;
        }

        .bank-btn {
            background: rgba(18, 24, 38, 0.9);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 16px;
            padding: 16px;
            text-align: center;
            cursor: pointer;
            transition: 0.3s;
            color: #fff;
        }

        .bank-btn:hover {
            transform: translateY(-2px);
            border-color: rgba(255, 215, 0, 0.15);
        }

        .bank-btn .icon {
            font-size: 32px;
            display: block;
            margin-bottom: 4px;
        }

        .bank-btn .name {
            font-size: 12px;
            font-weight: 600;
        }

        .payment-form {
            background: rgba(18, 24, 38, 0.9);
            backdrop-filter: blur(18px);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 24px;
            padding: 20px;
            display: none;
            animation: fadeSlide 0.4s ease;
        }

        .payment-form.show {
            display: block;
        }

        @keyframes fadeSlide {
            0% { opacity: 0; transform: translateY(10px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        .payment-form .form-group {
            margin-bottom: 12px;
        }

        .payment-form .form-group label {
            font-size: 12px;
            font-weight: 600;
            color: rgba(255, 255, 255, 0.3);
            display: block;
            margin-bottom: 4px;
        }

        .payment-form .form-group input {
            width: 100%;
            padding: 10px 14px;
            border-radius: 12px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            background: rgba(255, 255, 255, 0.02);
            color: #fff;
            font-size: 14px;
            outline: none;
            transition: 0.3s;
        }

        .payment-form .form-group input:focus {
            border-color: rgba(255, 215, 0, 0.15);
        }

        .payment-form .form-row {
            display: flex;
            gap: 10px;
        }

        .payment-form .form-row .form-group {
            flex: 1;
        }

        .btn-pay {
            width: 100%;
            padding: 14px;
            border-radius: 40px;
            border: none;
            font-weight: 800;
            font-size: 16px;
            text-transform: uppercase;
            background: linear-gradient(90deg, #ff00ff, #7b61ff, #0080ff, #00ff99, #ffee00, #ff6600);
            background-size: 400%;
            animation: rainbow 6s linear infinite;
            color: white;
            transition: 0.3s;
            cursor: pointer;
            margin-top: 10px;
        }

        @keyframes rainbow {
            0% { background-position: 0%; }
            100% { background-position: 400%; }
        }

        .btn-pay:hover {
            transform: scale(1.02);
            box-shadow: 0 0 30px #00bfff;
        }

        .btn-pay:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .status-message {
            text-align: center;
            padding: 20px;
            display: none;
        }

        .status-message .icon {
            font-size: 48px;
            display: block;
            margin-bottom: 8px;
        }

        .status-message h3 {
            font-size: 18px;
            font-weight: 700;
            color: #4ade80;
        }

        .status-message p {
            color: rgba(255, 255, 255, 0.3);
            font-size: 14px;
            margin-top: 4px;
        }

        @media (max-width: 440px) {
            .bank-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="app">
        <div class="header">
            <button class="back" onclick="window.location.href='index.html'">←</button>
            <h1>💳 Оплата</h1>
        </div>

        <div class="payment-amount">
            <div class="label">Сумма к оплате</div>
            <div class="amount" id="payAmount">0 ₽</div>
            <div class="order-id">Заказ #<span id="orderId">0000</span></div>
        </div>

        <div class="bank-grid" id="bankGrid">
            <button class="bank-btn" data-bank="sber">
                <span class="icon">🟢</span>
                <span class="name">Сбер</span>
            </button>
            <button class="bank-btn" data-bank="tbank">
                <span class="icon">🟡</span>
                <span class="name">Т-Банк</span>
            </button>
            <button class="bank-btn" data-bank="vtb">
                <span class="icon">🔵</span>
                <span class="name">ВТБ</span>
            </button>
            <button class="bank-btn" data-bank="alfa">
                <span class="icon">🟠</span>
                <span class="name">Альфа</span>
            </button>
            <button class="bank-btn" data-bank="yoo">
                <span class="icon">⚫</span>
                <span class="name">ЮMoney</span>
            </button>
        </div>

        <div class="payment-form" id="paymentForm">
            <div class="form-group">
                <label>Номер карты</label>
                <input type="text" id="cardNumber" placeholder="0000 0000 0000 0000" maxlength="19" />
            </div>
            <div class="form-group">
                <label>Имя владельца</label>
                <input type="text" id="cardName" placeholder="IVAN IVANOV" />
            </div>
            <div class="form-row">
                <div class="form-group">
                    <label>Срок действия</label>
                    <input type="text" id="cardExpiry" placeholder="MM/YY" maxlength="5" />
                </div>
                <div class="form-group">
                    <label>CVV</label>
                    <input type="text" id="cardCvv" placeholder="***" maxlength="3" />
                </div>
            </div>
            <button class="btn-pay" id="payBtn">ОПЛАТИТЬ</button>
        </div>

        <div class="status-message" id="statusMessage">
            <span class="icon">✅</span>
            <h3>Заказ успешно создан!</h3>
            <p>Администратор свяжется с вами в Telegram.</p>
        </div>
    </div>

    <script>
        // ===== ПОЛУЧАЕМ СУММУ =====
        var total = parseInt(localStorage.getItem('brawl_total') || '0');
        document.getElementById('payAmount').textContent = total + ' ₽';
        document.getElementById('orderId').textContent = String(Math.floor(1000 + Math.random() * 9000));

        // ===== ВЫБОР БАНКА =====
        var selectedBank = null;

        document.querySelectorAll('.bank-btn').forEach(function(btn) {
            btn.addEventListener('click', function() {
                selectedBank = this.dataset.bank;
                document.querySelectorAll('.bank-btn').forEach(function(b) {
                    b.style.borderColor = 'rgba(255,255,255,0.06)';
                });
                this.style.borderColor = 'rgba(255,215,0,0.3)';
                document.getElementById('paymentForm').classList.add('show');
            });
        });

        // ===== ОПЛАТА =====
        document.getElementById('payBtn').addEventListener('click', function() {
            var cardNumber = document.getElementById('cardNumber').value.trim();
            var cardName = document.getElementById('cardName').value.trim();
            var cardExpiry = document.getElementById('cardExpiry').value.trim();
            var cardCvv = document.getElementById('cardCvv').value.trim();

            if (!cardNumber || !cardName || !cardExpiry || !cardCvv) {
                alert('⚠️ Заполните все поля');
                return;
            }

            this.disabled = true;
            this.textContent = '⏳ Обработка...';

            setTimeout(function() {
                document.getElementById('paymentForm').style.display = 'none';
                document.getElementById('statusMessage').style.display = 'block';
                document.getElementById('bankGrid').style.display = 'none';
                // Сохраняем заказ
                var orders = parseInt(localStorage.getItem('brawl_orders') || '0');
                orders++;
                localStorage.setItem('brawl_orders', orders.toString());
                localStorage.removeItem('brawl_total');
                localStorage.removeItem('brawl_cart');
            }, 2000);
        });

        // ===== ФОРМАТИРОВАНИЕ ПОЛЕЙ =====
        document.getElementById('cardNumber').addEventListener('input', function() {
            var val = this.value.replace(/\D/g, '');
            if (val.length > 16) val = val.slice(0, 16);
            var formatted = val.replace(/(.{4})/g, '$1 ').trim();
            this.value = formatted;
        });

        document.getElementById('cardExpiry').addEventListener('input', function() {
            var val = this.value.replace(/\D/g, '');
            if (val.length > 4) val = val.slice(0, 4);
            if (val.length >= 2) {
                this.value = val.slice(0, 2) + '/' + val.slice(2);
            } else {
                this.value = val;
            }
        });

        document.getElementById('cardCvv').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '').slice(0, 3);
        });
    </script>
</body>
</html>
